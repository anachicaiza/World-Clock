<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.45/moment-timezone-with-data.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>World Clock</h1>
        <select id="city">
            <option value="">Select a city..</option>
            <option value="current">My current location</option>
            <option value="America/Mexico_City">Mexico</option>
            <option value="America/New_York">New York</option>
            <option value="Pacific/Auckland">Auckland</option>

        </select>
        <div id="cities">
            <div class="city" id="los-angeles">
                <div>
                    <h2>Los Angeles</h2>
                    <div class="date"></div>
                </div>
                <div class="time">
                    <small>AM</small>
                </div>
            </div>
            <div class="city" id="paris">
                <div>
                    <h2>Paris</h2>
                    <div class="date"></div>
                </div>
                <div class="time">
                    <small>PM</small>
                </div>
            </div>
            <div class="city" id="mexico">
                <div>
                    <h2>Mexico</h2>
                    <div class="date"></div>
                </div>
                <div class="time">
                    <small>PM</small>
                </div>
            </div>
        </div>
    </div>
    <footer>This project was coded by <strong>Ana Chicaiza</strong> and is open sourced on <a href=""
            target="_blank">Github</a>
    </footer>
    <script src="index.js"></script>
</body>

</html>
